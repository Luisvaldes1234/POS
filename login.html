<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="Acceso al punto de venta en mostrador.">
<title>POS · Acceso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--primary:#7C3AED;--primary-dark:#6d28d9;--ink:#0a0a14;--ink2:#1a1a2e;--muted:#94a3b8;--border:rgba(255,255,255,.1)}
  html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  body{display:flex;align-items:center;justify-content:center;padding:20px;color:#fff;
    background:linear-gradient(135deg,#1a1a2e 0%,#0a0a14 100%)}
  .card{background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:24px;padding:34px 30px;max-width:380px;width:100%;backdrop-filter:blur(10px);box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .logo{font-size:26px;font-weight:800;background:linear-gradient(135deg,#7C3AED,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
  .sub{font-size:13px;color:var(--muted);text-align:center;margin-top:6px;margin-bottom:26px}
  label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:6px}
  input{width:100%;padding:13px 15px;border-radius:12px;border:1.5px solid var(--border);background:rgba(255,255,255,.05);color:#fff;font-size:14px;font-family:inherit;outline:none;margin-bottom:16px;transition:border .15s}
  input:focus{border-color:var(--primary)}
  button{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7C3AED,#a855f7);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:filter .15s}
  button:hover:not(:disabled){filter:brightness(1.08)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{font-size:12.5px;text-align:center;margin-top:16px;min-height:18px;line-height:1.4}
  .msg.err{color:#fca5a5}
  .msg.ok{color:#6ee7b7}
  .foot{font-size:11px;color:var(--muted);text-align:center;margin-top:22px;line-height:1.5}
</style>
</head>
<body>
  <form class="card" id="login-form" autocomplete="on">
    <div class="logo">⚡ POS Mostrador</div>
    <div class="sub">Punto de venta para tiendas, kioscos y ferreterías</div>

    <label for="email">Email</label>
    <input id="email" type="email" name="email" autocomplete="username" required placeholder="cajero@tienda.com">

    <label for="password">Contraseña</label>
    <input id="password" type="password" name="password" autocomplete="current-password" required placeholder="••••••••">

    <button type="submit" id="btn">Ingresar</button>
    <div class="msg" id="msg"></div>
    <div class="foot">Usá las credenciales de tu cuenta del sistema.<br>El acceso lo gestiona el administrador de la organización.</div>
  </form>

<script>
  const SB_URL = 'https://zgdrvptneiwlxlaywfur.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnZHJ2cHRuZWl3bHhsYXl3ZnVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDU4NDgsImV4cCI6MjA5MDUyMTg0OH0.r1BR_OruT95Ks_xdkvlnuSqT8Lm-Vh6usJhgdLcV_Ig';
  const sb = supabase.createClient(SB_URL, SB_KEY);

  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');

  // Si ya hay sesión, ir directo al POS.
  sb.auth.getSession().then(({ data }) => {
    if (data?.session) window.location.replace('index.html');
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { msg.className = 'msg err'; msg.textContent = 'Completá email y contraseña'; return; }
    btn.disabled = true; btn.textContent = 'Ingresando…';
    msg.className = 'msg'; msg.textContent = '';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      btn.disabled = false; btn.textContent = 'Ingresar';
      msg.className = 'msg err';
      msg.textContent = /invalid/i.test(error.message) ? 'Email o contraseña incorrectos' : error.message;
      return;
    }
    msg.className = 'msg ok'; msg.textContent = '✓ Acceso correcto, abriendo POS…';
    window.location.replace('index.html');
  });
</script>
</body>
</html>
